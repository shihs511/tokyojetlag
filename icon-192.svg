<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#04040f"/>
      <stop offset="100%" stop-color="#0a0a2e"/>
    </linearGradient>
    <linearGradient id="tower" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff0080"/>
      <stop offset="100%" stop-color="#ff4400"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="192" height="192" rx="32" fill="url(#bg)"/>
  <!-- Stars -->
  <circle cx="30" cy="25" r="1.5" fill="#fff" opacity="0.6"/>
  <circle cx="160" cy="40" r="1" fill="#fff" opacity="0.4"/>
  <circle cx="45" cy="60" r="1" fill="#fff" opacity="0.3"/>
  <circle cx="150" cy="20" r="1.5" fill="#fff" opacity="0.5"/>
  <circle cx="120" cy="55" r="1" fill="#fff" opacity="0.4"/>
  <!-- Moon -->
  <circle cx="150" cy="35" r="12" fill="#ffe000" opacity="0.15" filter="url(#glow)"/>
  <circle cx="150" cy="35" r="6" fill="#ffe000" opacity="0.3"/>
  <!-- Tokyo Tower -->
  <path d="M96 28 L80 120 L72 170 L82 170 L84 140 L108 140 L110 170 L120 170 L112 120 Z" fill="url(#tower)" filter="url(#glow)"/>
  <!-- Tower bands -->
  <rect x="82" y="70" width="28" height="5" rx="1.5" fill="#fff" opacity="0.85"/>
  <rect x="84" y="90" width="24" height="4" rx="1.5" fill="#fff" opacity="0.6"/>
  <rect x="86" y="108" width="20" height="3" rx="1" fill="#fff" opacity="0.4"/>
  <!-- Tower top beacon -->
  <circle cx="96" cy="35" r="4" fill="#00f0ff" filter="url(#glow)"/>
  <line x1="96" y1="28" x2="96" y2="31" stroke="#00f0ff" stroke-width="2"/>
  <!-- City skyline at bottom -->
  <rect x="15" y="150" width="12" height="20" fill="#0f0f2a" rx="1"/>
  <rect x="30" y="140" width="10" height="30" fill="#0f0f2a" rx="1"/>
  <rect x="43" y="148" width="14" height="22" fill="#0f0f2a" rx="1"/>
  <rect x="132" y="145" width="12" height="25" fill="#0f0f2a" rx="1"/>
  <rect x="148" y="138" width="10" height="32" fill="#0f0f2a" rx="1"/>
  <rect x="162" y="150" width="16" height="20" fill="#0f0f2a" rx="1"/>
  <!-- Tiny windows on buildings -->
  <rect x="18" y="154" width="2" height="2" fill="#00f0ff" opacity="0.5"/>
  <rect x="22" y="158" width="2" height="2" fill="#ffe000" opacity="0.4"/>
  <rect x="34" y="144" width="2" height="2" fill="#ff0080" opacity="0.5"/>
  <rect x="34" y="150" width="2" height="2" fill="#00f0ff" opacity="0.3"/>
  <rect x="47" y="152" width="2" height="2" fill="#bf00ff" opacity="0.5"/>
  <rect x="136" y="150" width="2" height="2" fill="#ffe000" opacity="0.4"/>
  <rect x="152" y="142" width="2" height="2" fill="#ff0080" opacity="0.5"/>
  <rect x="166" y="154" width="2" height="2" fill="#00f0ff" opacity="0.4"/>
  <!-- Ground -->
  <rect x="0" y="170" width="192" height="22" rx="0" fill="#04040f"/>
  <!-- Text -->
  <text x="96" y="184" text-anchor="middle" font-family="sans-serif" font-weight="700" font-size="10" fill="#00f0ff" letter-spacing="0.1em" opacity="0.8">TOKYO JET LAG</text>
</svg>
