<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');

      .title {
        font-family: 'Orbitron', monospace;
        font-size: 120px;
        font-weight: 900;
        fill: #00f0ff;
        text-anchor: middle;
        filter: drop-shadow(0 0 20px #00f0ff) drop-shadow(0 0 40px #0088ff);
      }

      .subtitle {
        font-family: 'Orbitron', monospace;
        font-size: 48px;
        font-weight: 700;
        fill: #ff0080;
        text-anchor: middle;
        filter: drop-shadow(0 0 15px #ff0080) drop-shadow(0 0 30px #ff1493);
      }

      .url {
        font-family: 'Courier New', monospace;
        font-size: 28px;
        font-weight: bold;
        fill: #00f0ff;
        text-anchor: middle;
        filter: drop-shadow(0 0 10px #00f0ff);
        opacity: 0.9;
      }
    </style>

    <!-- Radial gradient for background -->
    <radialGradient id="bgGradient" cx="50%" cy="30%">
      <stop offset="0%" style="stop-color:#1a0a3e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#04040f;stop-opacity:1" />
    </radialGradient>

    <!-- Cyan glow for neon effect -->
    <filter id="cyanGlow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Pink glow for subtitle -->
    <filter id="pinkGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Dark background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>

  <!-- Grid overlay for cyberpunk atmosphere -->
  <g stroke="#0088ff" stroke-width="1" opacity="0.15">
    <!-- Vertical lines -->
    <line x1="100" y1="0" x2="100" y2="630"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="500" y1="0" x2="500" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="700" y1="0" x2="700" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
    <line x1="1100" y1="0" x2="1100" y2="630"/>

    <!-- Horizontal lines -->
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
  </g>

  <!-- Accent neon lines at top -->
  <line x1="200" y1="80" x2="400" y2="80" stroke="#00f0ff" stroke-width="2" opacity="0.6" filter="url(#cyanGlow)"/>
  <line x1="800" y1="80" x2="1000" y2="80" stroke="#ff0080" stroke-width="2" opacity="0.6" filter="url(#pinkGlow)"/>

  <!-- Tokyo Skyline Silhouette -->
  <g opacity="0.8" fill="#0a0a20">
    <!-- Far buildings (background) -->
    <rect x="0" y="420" width="80" height="210" opacity="0.3"/>
    <rect x="100" y="400" width="60" height="230" opacity="0.3"/>
    <rect x="180" y="430" width="70" height="200" opacity="0.3"/>

    <!-- Mid-ground buildings -->
    <rect x="30" y="380" width="90" height="250"/>
    <polygon points="150,350 120,350 100,400 200,400"/>
    <rect x="220" y="340" width="110" height="290"/>
    <polygon points="360,320 320,320 300,370 420,370"/>
    <rect x="450" y="360" width="95" height="270"/>
    <polygon points="570,330 540,330 520,380 620,380"/>

    <!-- Tall buildings (foreground) -->
    <rect x="70" y="300" width="85" height="330"/>
    <polygon points="200,280 160,280 140,340 260,340"/>
    <rect x="290" y="250" width="100" height="380"/>
    <polygon points="430,290 400,290 380,350 500,350"/>
    <rect x="540" y="270" width="95" height="360"/>
    <polygon points="680,310 650,310 630,370 750,370"/>
    <rect x="780" y="330" width="100" height="300"/>
    <polygon points="920,350 890,350 870,410 970,410"/>
    <rect x="1020" y="380" width="90" height="250"/>
    <polygon points="1140,400 1110,400 1100,450 1200,450"/>
    <rect x="1120" y="420" width="80" height="210"/>
  </g>

  <!-- Neon accent lines in skyline -->
  <line x1="150" y1="350" x2="150" y2="630" stroke="#00f0ff" stroke-width="1" opacity="0.4"/>
  <line x1="360" y1="320" x2="360" y2="630" stroke="#ff0080" stroke-width="1" opacity="0.4"/>
  <line x1="680" y1="310" x2="680" y2="630" stroke="#00f0ff" stroke-width="1" opacity="0.4"/>
  <line x1="920" y1="350" x2="920" y2="630" stroke="#ff0080" stroke-width="1" opacity="0.4"/>

  <!-- Scattered particles/dots for atmosphere -->
  <g fill="#00f0ff" opacity="0.6">
    <circle cx="150" cy="120" r="2"/>
    <circle cx="420" cy="200" r="1.5"/>
    <circle cx="950" cy="150" r="2"/>
    <circle cx="200" cy="280" r="1"/>
    <circle cx="800" cy="220" r="1.5"/>
    <circle cx="1050" cy="100" r="2"/>
    <circle cx="320" cy="160" r="1"/>
    <circle cx="680" cy="200" r="1.5"/>
  </g>

  <g fill="#ff0080" opacity="0.5">
    <circle cx="300" cy="140" r="1.5"/>
    <circle cx="600" cy="250" r="2"/>
    <circle cx="880" cy="180" r="1"/>
    <circle cx="1100" cy="220" r="1.5"/>
    <circle cx="450" cy="300" r="1"/>
  </g>

  <!-- Main title: TOKYO JET LAG -->
  <text x="600" y="240" class="title">TOKYO JET LAG</text>

  <!-- Subtitle: It's 2AM. Now What? -->
  <text x="600" y="320" class="subtitle">It's 2AM. Now What?</text>

  <!-- URL at bottom -->
  <text x="600" y="600" class="url">tokyojetlag.com</text>

  <!-- Decorative corner accents -->
  <g stroke="#00f0ff" stroke-width="2" fill="none" opacity="0.7">
    <!-- Top left corner -->
    <path d="M 20 20 L 80 20 M 20 20 L 20 80"/>
    <!-- Top right corner -->
    <path d="M 1180 20 L 1120 20 M 1180 20 L 1180 80"/>
    <!-- Bottom left corner -->
    <path d="M 20 610 L 80 610 M 20 610 L 20 550"/>
    <!-- Bottom right corner -->
    <path d="M 1180 610 L 1120 610 M 1180 610 L 1180 550"/>
  </g>
</svg>