<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#04040f"/>
      <stop offset="100%" stop-color="#0a0a2e"/>
    </linearGradient>
    <linearGradient id="tower" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff0080"/>
      <stop offset="100%" stop-color="#ff4400"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Stars -->
  <circle cx="80" cy="60" r="3" fill="#fff" opacity="0.6"/>
  <circle cx="420" cy="100" r="2.5" fill="#fff" opacity="0.4"/>
  <circle cx="120" cy="150" r="2" fill="#fff" opacity="0.3"/>
  <circle cx="400" cy="50" r="3" fill="#fff" opacity="0.5"/>
  <circle cx="320" cy="130" r="2" fill="#fff" opacity="0.4"/>
  <circle cx="60" cy="120" r="2" fill="#fff" opacity="0.3"/>
  <!-- Moon -->
  <circle cx="400" cy="90" r="30" fill="#ffe000" opacity="0.12" filter="url(#glow)"/>
  <circle cx="400" cy="90" r="16" fill="#ffe000" opacity="0.3"/>
  <!-- Tokyo Tower -->
  <path d="M256 65 L210 310 L190 450 L220 450 L226 370 L286 370 L292 450 L322 450 L302 310 Z" fill="url(#tower)" filter="url(#glow)"/>
  <rect x="216" y="180" width="80" height="14" rx="4" fill="#fff" opacity="0.85"/>
  <rect x="222" y="230" width="68" height="11" rx="3" fill="#fff" opacity="0.6"/>
  <rect x="228" y="275" width="56" height="9" rx="2.5" fill="#fff" opacity="0.4"/>
  <!-- Beacon -->
  <circle cx="256" cy="82" r="10" fill="#00f0ff" filter="url(#glow)"/>
  <line x1="256" y1="65" x2="256" y2="72" stroke="#00f0ff" stroke-width="4"/>
  <!-- Skyline -->
  <rect x="35" y="395" width="35" height="55" fill="#0f0f2a" rx="2"/>
  <rect x="78" y="370" width="28" height="80" fill="#0f0f2a" rx="2"/>
  <rect x="114" y="388" width="40" height="62" fill="#0f0f2a" rx="2"/>
  <rect x="350" y="380" width="32" height="70" fill="#0f0f2a" rx="2"/>
  <rect x="392" y="360" width="28" height="90" fill="#0f0f2a" rx="2"/>
  <rect x="430" y="390" width="44" height="60" fill="#0f0f2a" rx="2"/>
  <!-- Windows -->
  <rect x="44" y="405" width="5" height="5" fill="#00f0ff" opacity="0.5"/>
  <rect x="56" y="415" width="5" height="5" fill="#ffe000" opacity="0.4"/>
  <rect x="88" y="378" width="5" height="5" fill="#ff0080" opacity="0.5"/>
  <rect x="88" y="395" width="5" height="5" fill="#00f0ff" opacity="0.3"/>
  <rect x="124" y="398" width="5" height="5" fill="#bf00ff" opacity="0.5"/>
  <rect x="360" y="392" width="5" height="5" fill="#ffe000" opacity="0.4"/>
  <rect x="402" y="370" width="5" height="5" fill="#ff0080" opacity="0.5"/>
  <rect x="444" y="400" width="5" height="5" fill="#00f0ff" opacity="0.4"/>
  <!-- Ground -->
  <rect x="0" y="450" width="512" height="62" rx="0" fill="#04040f"/>
  <!-- Text -->
  <text x="256" y="488" text-anchor="middle" font-family="sans-serif" font-weight="700" font-size="26" fill="#00f0ff" letter-spacing="0.15em" opacity="0.8">TOKYO JET LAG</text>
</svg>
